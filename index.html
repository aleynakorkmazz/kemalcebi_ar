<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Günü AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        
        #version-badge {
            position: absolute; top: 15px; right: 15px;
            color: #00ff00; background-color: rgba(0, 0, 0, 0.7);
            padding: 6px 12px; font-family: sans-serif;
            font-size: 14px; font-weight: bold;
            border-radius: 8px; border: 1px solid #00ff00;
            z-index: 9999; pointer-events: none;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10000;
        }

        #start-text {
            color: white; margin-bottom: 20px; font-family: sans-serif;
            text-align: center; padding: 0 20px;
        }

        #start-button {
            padding: 15px 30px; font-size: 18px; color: white;
            background-color: #6200ee; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold;
        }
    </style>

    <script>
        // Versiyon Sayacı
        document.addEventListener("DOMContentLoaded", function() {
            let vCount = localStorage.getItem('v_count') || 0;
            vCount = parseInt(vCount) + 1;
            localStorage.setItem('v_count', vCount);
            document.getElementById('version-badge').innerText = "v1.0." + vCount;

            const startScreen = document.getElementById('start-screen');
            const startButton = document.getElementById('start-button');
            const video = document.querySelector('#ar-video');

            startButton.addEventListener('click', function() {
                video.play().then(() => {
                    video.pause();
                    startScreen.style.display = 'none';
                });
            });
        });

        AFRAME.registerComponent('video-controller', {
            init: function () {
                const target = this.el;
                const video = document.querySelector('#ar-video');
                target.addEventListener('targetFound', () => { video.play(); });
                target.addEventListener('targetLost', () => { video.pause(); });
            }
        });
    </script>
</head>
<body>

    <div id="version-badge">v1.0.0</div>

    <div id="start-screen">
        <div id="start-text">Hoş Geldiniz!<br>Deneyimi başlatmak için butona tıklayın.</div>
        <button id="start-button">BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video id="ar-video" src="yeni.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <a-video src="#ar-video" position="0 0 0" width="1" height="0.5625" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

</body>
</html>
