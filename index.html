<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Günü AR - v1.2</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: black; }
        
        #version-badge {
            position: absolute; top: 15px; right: 15px;
            color: #00ff00; background-color: rgba(0, 0, 0, 0.8);
            padding: 6px 12px; font-family: sans-serif;
            font-size: 13px; font-weight: bold;
            border-radius: 8px; border: 1px solid #00ff00;
            z-index: 10000;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10001;
        }

        #start-button {
            padding: 20px 40px; font-size: 20px; color: white;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,123,255,0.5);
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Versiyon Sayacı
            let ver = localStorage.getItem('v_pi_new') || 0;
            ver = parseInt(ver) + 1;
            localStorage.setItem('v_pi_new', ver);
            document.getElementById('version-badge').innerText = "v1.2." + ver;

            const startScreen = document.getElementById('start-screen');
            const startButton = document.getElementById('start-button');
            const video = document.querySelector('#ar-video');

            startButton.addEventListener('click', function() {
                // EKRANIN GİTMESİNİ GARANTİLEMEK İÇİN:
                startScreen.style.opacity = "0";
                setTimeout(() => { startScreen.style.display = 'none'; }, 300);

                // Videoyu sessiz başlatıp yetki alıyoruz
                video.muted = true; 
                video.play().then(() => {
                    video.pause();
                    video.muted = false; // Kullanıcı dokunduğu için artık ses açılabilir
                }).catch(e => console.log("Video yetki bekliyor..."));
            });
        });

        AFRAME.registerComponent('video-controller', {
            init: function () {
                const target = this.el;
                const video = document.querySelector('#ar-video');
                target.addEventListener('targetFound', () => { video.play(); });
                target.addEventListener('targetLost', () => { video.pause(); });
            }
        });
    </script>
</head>
<body>

    <div id="version-badge">v1.2.0</div>

    <div id="start-screen">
        <button id="start-button">DENEYİMİ BAŞLAT</button>
        <p style="color: grey; margin-top: 15px; font-family: sans-serif; font-size: 12px;">Kamera izni vermeyi unutmayın.</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="ar-video" src="yeni.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <a-video src="#ar-video" position="0 0 0" width="1.05" height="0.60" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

</body>
</html>
