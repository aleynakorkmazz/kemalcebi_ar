<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemal Çebi AR - v1.3</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        #version-badge {
            position: absolute; top: 15px; right: 15px;
            color: #00ff00; background-color: rgba(0, 0, 0, 0.8);
            padding: 6px 12px; font-family: sans-serif;
            font-size: 13px; font-weight: bold;
            border-radius: 8px; border: 1px solid #00ff00;
            z-index: 10000;
        }

        /* Başlangıç Ekranı */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex; justify-content: center; align-items: center;
            z-index: 99999; /* En üstte durmasını garanti eder */
            transition: opacity 0.5s ease;
        }

        #start-button {
            padding: 20px 40px; font-size: 22px; color: white;
            background: #007bff; border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px rgba(0,123,255,0.6);
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Versiyon Güncelleme
            let v = localStorage.getItem('v_pi_final') || 0;
            v = parseInt(v) + 1;
            localStorage.setItem('v_pi_final', v);
            document.getElementById('version-badge').innerText = "v1.3." + v;

            const startScreen = document.getElementById('start-screen');
            const startButton = document.getElementById('start-button');
            const video = document.querySelector('#ar-video');

            startButton.addEventListener('click', function() {
                // EKRANI HEMEN GİZLE (Hata olsa bile gitsin)
                startScreen.style.opacity = "0";
                setTimeout(() => { startScreen.style.display = 'none'; }, 500);

                // Videoyu uyandır
                video.play().then(() => {
                    video.pause();
                }).catch(e => console.log("Video hazır bekliyor..."));
            });
        });

        // AR Kontrolcü
        AFRAME.registerComponent('video-handler', {
            init: function () {
                const video = document.querySelector('#ar-video');
                this.el.addEventListener('targetFound', () => { video.play(); });
                this.el.addEventListener('targetLost', () => { video.pause(); });
            }
        });
    </script>
</head>
<body>

    <div id="version-badge">v1.3.0</div>

    <div id="start-screen">
        <button id="start-button">BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="ar-video" src="yeni.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-handler>
            <a-video src="#ar-video" position="0 0 0" width="1.05" height="0.62" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

</body>
</html>
